name: 📝 Generate Changelog

on:
  workflow_dispatch: # Manual trigger only - changelog generation is integrated into production deployment

jobs:
  generate-changelog:
    name: 📝 Generate and Upload Changelog
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      issues: read
      pull-requests: read
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history for git tags and commits

      - name: 📝 Generate Changelog
        run: |
          chmod +x ./scripts/generate-changelog.sh
          ./scripts/generate-changelog.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🌐 Translate Changelog to Czech
        run: |
          echo "📋 Translating changelog to Czech..."
          
          # Check if OPENAI_API_KEY is set
          if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "❌ OPENAI_API_KEY secret is not set!"
            exit 1
          fi
          
          # Read and prepare the source file
          echo "📋 Preparing source JSON..."
          SOURCE_JSON=$(cat frontend/public/changelog.json)
          echo "📋 Source JSON size: ${#SOURCE_JSON} characters"
          
          # Create the request payload using jq to properly escape JSON
          REQUEST_PAYLOAD=$(jq -n \
            --arg source_json "$SOURCE_JSON" \
            '{
              "model": "gpt-4o",
              "messages": [
                {"role": "system", "content": "Jsi redaktor poznámek k vydání pro aplikaci kosmetické firmy. Tvým úkolem je přepsat technické commit zprávy do přívětivého, srozumitelného češtiny pro netechnické zaměstnance (skladníky, účetní, vedení). Pravidla:\n- Piš přirozeně česky, jako bys psal kolegům\n- Vysvětli CO se změnilo a PROČ je to pro uživatele důležité, ne jak to bylo implementováno\n- Vynechej technické detaily (názvy souborů, hashí, čísla PR v závorkách jako (#123))\n- Typy změn převeď: feature→novinka, fix→oprava, refactor→vylepšení, test→interní, docs→dokumentace, perf→zrychlení\n- Zachovej JSON strukturu beze změny – překládej pouze hodnoty polí title a description\n- Vrať pouze validní JSON bez markdown formátování nebo code bloků"},
                {"role": "user", "content": $source_json}
              ]
            }')
          
          echo "📋 Request payload size: ${#REQUEST_PAYLOAD} characters"
          
          # Make the API call
          echo "📋 Calling OpenAI API..."
          RESPONSE=$(curl -s -w "\n%{http_code}" https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
            -d "$REQUEST_PAYLOAD")
          
          # Extract HTTP status code and response body
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          RESPONSE_BODY=$(echo "$RESPONSE" | head -n -1)
          
          echo "📋 HTTP Status: $HTTP_CODE"
          echo "📋 Response size: ${#RESPONSE_BODY} characters"
          
          # Check HTTP status
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "❌ OpenAI API call failed with status $HTTP_CODE"
            echo "Response:"
            echo "$RESPONSE_BODY"
            exit 1
          fi
          
          # Check if response is valid JSON
          if ! echo "$RESPONSE_BODY" | jq empty; then
            echo "❌ OpenAI API returned invalid JSON"
            echo "Response:"
            echo "$RESPONSE_BODY"
            exit 1
          fi
          
          # Extract the translated content
          TRANSLATED_CONTENT=$(echo "$RESPONSE_BODY" | jq -r '.choices[0].message.content')
          
          if [ "$TRANSLATED_CONTENT" = "null" ] || [ -z "$TRANSLATED_CONTENT" ]; then
            echo "❌ No translation content in API response"
            echo "API Response:"
            echo "$RESPONSE_BODY"
            exit 1
          fi
          
          echo "📋 Raw translated content size: ${#TRANSLATED_CONTENT} characters"
          
          # Extract JSON from markdown code blocks if present
          if echo "$TRANSLATED_CONTENT" | grep -q '```json'; then
            echo "📋 Extracting JSON from markdown code block..."
            TRANSLATED_JSON=$(echo "$TRANSLATED_CONTENT" | sed -n '/```json/,/```/p' | sed '1d;$d')
          else
            echo "📋 Using direct content as JSON..."
            TRANSLATED_JSON="$TRANSLATED_CONTENT"
          fi
          
          if [ -z "$TRANSLATED_JSON" ]; then
            echo "❌ No JSON content found in translation"
            echo "Full content:"
            echo "$TRANSLATED_CONTENT"
            exit 1
          fi
          
          echo "📋 Extracted JSON size: ${#TRANSLATED_JSON} characters"
          
          # Save the translated content
          echo "$TRANSLATED_JSON" > frontend/public/changelog.cs.json
          
          # Validate the translated JSON
          if ! jq empty frontend/public/changelog.cs.json; then
            echo "❌ Translated changelog.cs.json is not valid JSON!"
            echo "Translated content:"
            cat frontend/public/changelog.cs.json
            exit 1
          fi
          
          echo "✅ Czech translation generated successfully!"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: 📊 Changelog Summary
        run: |
          echo "## 📝 Generated Changelog Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **English File**: \`frontend/public/changelog.json\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Czech File**: \`frontend/public/changelog.cs.json\`" >> $GITHUB_STEP_SUMMARY
          echo "- **English File Size**: $(ls -lh frontend/public/changelog.json | awk '{print $5}')" >> $GITHUB_STEP_SUMMARY
          echo "- **Czech File Size**: $(ls -lh frontend/public/changelog.cs.json | awk '{print $5}')" >> $GITHUB_STEP_SUMMARY
          
          if command -v jq >/dev/null 2>&1; then
            CURRENT_VERSION=$(jq -r '.currentVersion' frontend/public/changelog.json)
            VERSION_COUNT=$(jq -r '.versions | length' frontend/public/changelog.json)
            echo "- **Current Version**: \`$CURRENT_VERSION\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Total Versions**: \`$VERSION_COUNT\`" >> $GITHUB_STEP_SUMMARY
            
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📋 Latest Version Changes (English):" >> $GITHUB_STEP_SUMMARY
            jq -r '.versions[0].changes[] | "- **" + .type + "**: " + .title' frontend/public/changelog.json >> $GITHUB_STEP_SUMMARY
            
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📋 Latest Version Changes (Czech):" >> $GITHUB_STEP_SUMMARY
            jq -r '.versions[0].changes[] | "- **" + .type + "**: " + .title' frontend/public/changelog.cs.json >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📤 Upload Changelog Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: changelog-preview
          path: |
            frontend/public/changelog.json
            frontend/public/changelog.cs.json
          retention-days: 7

      - name: 📋 Validation Check
        run: |
          # Validate JSON format
          if ! jq empty frontend/public/changelog.json; then
            echo "❌ Generated changelog.json is not valid JSON!"
            exit 1
          fi
          
          # Check required fields
          REQUIRED_FIELDS=("currentVersion" "lastUpdated" "versions")
          for field in "${REQUIRED_FIELDS[@]}"; do
            if ! jq -e ".$field" frontend/public/changelog.json >/dev/null; then
              echo "❌ Missing required field: $field"
              exit 1
            fi
          done
          
          # Validate Czech translation if it exists
          if [ -f frontend/public/changelog.cs.json ]; then
            if ! jq empty frontend/public/changelog.cs.json; then
              echo "❌ Czech changelog.cs.json is not valid JSON!"
              exit 1
            fi
            echo "✅ Czech translation validation passed!"
          fi
          
          echo "✅ Changelog validation passed!"
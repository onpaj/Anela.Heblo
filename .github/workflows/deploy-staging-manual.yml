name: 🚀 Deploy to Staging (Manual)

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to deploy to staging'
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

env:
  REGISTRY: docker.io
  IMAGE_NAME: heblo

jobs:
  deploy-staging:
    name: 🚀 Deploy PR to Staging
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Resolve image tag from PR
        id: resolve
        run: |
          PR_NUMBER="${{ github.event.inputs.pr_number }}"

          SHA=$(gh pr view "$PR_NUMBER" --json headRefOid -q .headRefOid | cut -c1-7)

          if [ -z "$SHA" ]; then
            echo "❌ Could not resolve SHA for PR #$PR_NUMBER"
            exit 1
          fi

          VERSION="staging-PR${PR_NUMBER}-${SHA}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "📌 Resolved image: $VERSION"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔐 Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_TEST }}

      - name: 🚀 Deploy to Azure Web App (Staging)
        id: deploy
        run: |
          WEBAPP_NAME="heblo-test"
          DOCKER_IMAGE="${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.resolve.outputs.version }}"

          echo "🎯 Deploying to: $WEBAPP_NAME"
          echo "🐳 Image: $DOCKER_IMAGE"

          az webapp config set \
            --name $WEBAPP_NAME \
            --resource-group rgHeblo \
            --linux-fx-version "DOCKER|$DOCKER_IMAGE" \
            --output none

          az webapp config container set \
            --name $WEBAPP_NAME \
            --resource-group rgHeblo \
            --container-image-name "$DOCKER_IMAGE" \
            --container-registry-url https://index.docker.io/v1/ \
            --output none

          az webapp restart \
            --name $WEBAPP_NAME \
            --resource-group rgHeblo \
            --output none

          sleep 15

          WEBAPP_HOSTNAME=$(az webapp show \
            --name $WEBAPP_NAME \
            --resource-group rgHeblo \
            --query "defaultHostName" \
            --output tsv)

          echo "hostname=$WEBAPP_HOSTNAME" >> $GITHUB_OUTPUT
          echo "WEBAPP_NAME=$WEBAPP_NAME" >> $GITHUB_ENV

      - name: 🔧 Configure App Settings
        run: |
          az webapp config appsettings set \
            --resource-group rgHeblo \
            --name $WEBAPP_NAME \
            --settings \
              ASPNETCORE_ENVIRONMENT=Staging \
              WEBSITES_PORT=8080 \
              WEBSITES_ENABLE_APP_SERVICE_STORAGE=false \
              DOCKER_REGISTRY_SERVER_URL=https://index.docker.io \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false \
              APP_VERSION="${{ steps.resolve.outputs.version }}" \
              DEPLOYMENT_SOURCE="Manual-PR${{ steps.resolve.outputs.pr_number }}"

      - name: ⏳ Wait for deployment to be ready
        run: |
          echo "⏳ Waiting for deployment to be ready..."
          sleep 30
          for i in {1..10}; do
            if curl -s -o /dev/null -w "%{http_code}" https://${{ steps.deploy.outputs.hostname }}/health | grep -q "200"; then
              echo "✅ Deployment is ready!"
              break
            fi
            echo "⏳ Waiting... ($i/10)"
            sleep 10
          done

      - name: 💬 Comment on PR
        run: |
          gh pr comment ${{ steps.resolve.outputs.pr_number }} \
            --body "## 🚀 Manually Deployed to Staging

          - **🌐 URL**: https://${{ steps.deploy.outputs.hostname }}
          - **📦 Version**: ${{ steps.resolve.outputs.version }}
          - **🐳 Docker Image**: \`${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.resolve.outputs.version }}\`
          - **🕐 Deployed**: $(date)

          _Manually triggered by @${{ github.actor }} ✨_" \
            --edit-last || \
          gh pr comment ${{ steps.resolve.outputs.pr_number }} \
            --body "## 🚀 Manually Deployed to Staging

          - **🌐 URL**: https://${{ steps.deploy.outputs.hostname }}
          - **📦 Version**: ${{ steps.resolve.outputs.version }}
          - **🐳 Docker Image**: \`${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.resolve.outputs.version }}\`
          - **🕐 Deployed**: $(date)

          _Manually triggered by @${{ github.actor }} ✨_"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Deployment Summary
        run: |
          echo "## 🚀 Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **PR**: #${{ steps.resolve.outputs.pr_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.resolve.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://${{ steps.deploy.outputs.hostname }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date)" >> $GITHUB_STEP_SUMMARY

name: 🎭 E2E Nightly Regression Tests

on:
  # Scheduled - Every night at 2:00 AM CET (1:00 AM UTC)
  schedule:
    - cron: '0 1 * * *'  # 1:00 AM UTC = 2:00 AM CET

  # Manual trigger with optional test pattern filter
  workflow_dispatch:
    inputs:
      test_pattern:
        description: 'Test pattern (e.g., "catalog" or "auth", leave empty for all E2E tests)'
        required: false
        default: ''
        type: string
      browser:
        description: 'Browser to run tests on'
        required: false
        default: 'chromium'
        type: choice
        options:
          - 'chromium'
          - 'firefox'
          - 'webkit'
          - 'all'
      enable_parallel:
        description: 'Enable parallel execution across modules (may cause timeouts under heavy load)'
        required: false
        default: false
        type: boolean
      deploy_staging:
        description: 'Deploy current main to staging before running tests (disable to test a pre-deployed build)'
        required: false
        default: true
        type: boolean

env:
  STAGING_URL: https://heblo.stg.anela.cz
  NODE_VERSION: '18'
  REGISTRY: docker.io
  IMAGE_NAME: heblo
  # Image tag deployed to staging — 'latest' always points to the most recent main build
  IMAGE_TAG: latest

# Required permissions for test reporter to create check runs
permissions:
  checks: write      # Allow creating check runs for test results
  contents: read     # Allow reading repository contents

jobs:
  # Deploy current main to staging so E2E tests run against fresh code, not stale deployments
  deploy-staging:
    name: 🚀 Deploy main to Staging
    runs-on: ubuntu-latest
    # Always deploy on the nightly schedule; on manual runs honor the deploy_staging toggle (default true)
    if: github.event_name == 'schedule' || github.event.inputs.deploy_staging != 'false'
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔖 Capture deployed commit
        id: commit
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "📌 Deploying main @ $SHORT_SHA (image tag: ${{ env.IMAGE_TAG }})"

      - name: 🔐 Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_TEST }}

      - name: 🚀 Deploy to Azure Web App (Staging)
        run: |
          WEBAPP_NAME="heblo-test"
          DOCKER_IMAGE="${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"

          echo "🎯 Deploying to: $WEBAPP_NAME"
          echo "🐳 Image: $DOCKER_IMAGE"

          az webapp config set \
            --name $WEBAPP_NAME \
            --resource-group rgHeblo \
            --linux-fx-version "DOCKER|$DOCKER_IMAGE" \
            --output none

          az webapp config container set \
            --name $WEBAPP_NAME \
            --resource-group rgHeblo \
            --container-image-name "$DOCKER_IMAGE" \
            --container-registry-url https://index.docker.io/v1/ \
            --output none

          az webapp restart \
            --name $WEBAPP_NAME \
            --resource-group rgHeblo \
            --output none

          echo "WEBAPP_NAME=$WEBAPP_NAME" >> $GITHUB_ENV

      - name: 🔧 Configure App Settings
        run: |
          az webapp config appsettings set \
            --resource-group rgHeblo \
            --name $WEBAPP_NAME \
            --settings \
              ASPNETCORE_ENVIRONMENT=Staging \
              WEBSITES_PORT=8080 \
              WEBSITES_ENABLE_APP_SERVICE_STORAGE=false \
              DOCKER_REGISTRY_SERVER_URL=https://index.docker.io \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false \
              APP_VERSION="staging-main-${{ steps.commit.outputs.short_sha }}" \
              DEPLOYMENT_SOURCE="E2E-Nightly-Main" \
            --output none

      - name: ⏳ Wait for staging to be ready
        run: |
          echo "⏳ Waiting for staging deployment to become ready..."
          # Initial wait for image pull + container startup
          sleep 60

          MAX_ATTEMPTS=20
          ATTEMPT=1
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "🔍 Readiness check attempt $ATTEMPT/$MAX_ATTEMPTS..."
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.STAGING_URL }}/health/ready" || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Staging is ready! (attempt $ATTEMPT/$MAX_ATTEMPTS)"
              break
            fi

            if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
              echo "❌ Staging failed to become ready after $MAX_ATTEMPTS attempts (last HTTP $HTTP_CODE)"
              exit 1
            fi

            echo "⏳ Not ready yet (HTTP $HTTP_CODE), waiting 15s..."
            sleep 15
            ATTEMPT=$((ATTEMPT + 1))
          done

      - name: 📝 Deployment Summary
        run: |
          echo "## 🚀 Staging Deployment (Pre-E2E)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Source**: main @ \`${{ steps.commit.outputs.short_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${{ env.STAGING_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed at**: $(date)" >> $GITHUB_STEP_SUMMARY

  # Validate staging health before running tests
  validate-staging-health:
    name: 🏥 Validate Staging Health
    runs-on: ubuntu-latest
    needs: deploy-staging
    # Run after a successful deploy, or when the deploy was intentionally skipped (manual run, deploy_staging=false)
    if: always() && needs.deploy-staging.result != 'failure' && needs.deploy-staging.result != 'cancelled'

    steps:
      - name: 📊 Check Liveness Endpoint
        id: liveness
        run: |
          echo "🔍 Checking liveness endpoint..."
          http_code=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.STAGING_URL }}/health/live")

          if [ "$http_code" = "200" ]; then
            echo "✅ Liveness check passed"
            echo "liveness_status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Liveness check failed with status $http_code"
            echo "liveness_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: 📊 Check Readiness Endpoint
        id: readiness
        run: |
          echo "🔍 Checking readiness endpoint..."
          http_code=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.STAGING_URL }}/health/ready")

          if [ "$http_code" = "200" ]; then
            echo "✅ Readiness check passed"
            echo "readiness_status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Readiness check failed with status $http_code"
            echo "readiness_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: 📊 Check General Health Endpoint
        id: health
        run: |
          echo "🔍 Checking general health endpoint..."
          http_code=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.STAGING_URL }}/health")

          if [ "$http_code" = "200" ]; then
            echo "✅ General health check passed"
            echo "health_status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ General health check failed with status $http_code"
            echo "health_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: 📝 Health Check Summary
        run: |
          echo "## 🏥 Staging Health Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Endpoint | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Liveness | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Readiness | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| General Health | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Staging URL:** ${{ env.STAGING_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "🕐 **Validated at:** $(date)" >> $GITHUB_STEP_SUMMARY

  # Run E2E tests against staging with optional parallel module execution
  run-e2e-tests:
    name: 🎭 Run E2E Tests (${{ matrix.module }})
    runs-on: ubuntu-latest
    needs: validate-staging-health
    strategy:
      fail-fast: false
      matrix:
        # Conditional matrix: parallel mode runs modules separately, sequential mode runs all at once
        module: ${{ fromJSON(github.event.inputs.enable_parallel == 'true' && '["catalog", "issued-invoices", "stock-operations", "transport", "manufacturing", "core", "marketing"]' || '["all"]') }}

    steps:
      - name: ℹ️ Test execution mode
        run: |
          if [ "${{ matrix.module }}" = "all" ]; then
            echo "🔄 Mode: Sequential execution (all tests, 1 worker)"
            echo "⚠️  Parallel execution is DISABLED to prevent staging environment timeouts"
          else
            echo "⚡ Mode: Parallel execution (module: ${{ matrix.module }})"
            echo "✅ Parallel execution is ENABLED"
          fi

      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      - name: 🎭 Install Playwright browsers
        working-directory: ./frontend
        run: |
          # Always install chromium for modular execution
          npx playwright install --with-deps chromium

      - name: 📂 List E2E test files for module
        working-directory: ./frontend
        run: |
          if [ "${{ matrix.module }}" = "all" ]; then
            echo "🔍 Running ALL E2E tests (sequential mode):"
            find test/e2e -name "*.spec.ts" -type f ! -path "*/helpers/*" ! -path "*/fixtures/*" | sort
            echo ""
            echo "📊 Total test count: $(find test/e2e -name "*.spec.ts" -type f ! -path "*/helpers/*" ! -path "*/fixtures/*" | wc -l)"
          else
            echo "🔍 Test files in module '${{ matrix.module }}':"
            find test/e2e/${{ matrix.module }} -name "*.spec.ts" -type f | sort
            echo ""
            echo "📊 Test count: $(find test/e2e/${{ matrix.module }} -name "*.spec.ts" -type f | wc -l)"
          fi

      - name: 🔐 Validate Azure credentials
        working-directory: ./frontend
        run: |
          if [ -z "${{ secrets.E2E_CLIENT_ID }}" ] || [ -z "${{ secrets.E2E_CLIENT_SECRET }}" ]; then
            echo "❌ E2E Azure credentials are not configured!"
            echo "Required secrets: E2E_CLIENT_ID, E2E_CLIENT_SECRET"
            exit 1
          fi
          echo "✅ Azure credentials validated"

      - name: 🧪 Run E2E tests for module
        id: run-tests
        working-directory: ./frontend
        continue-on-error: true
        run: |
          if [ "${{ matrix.module }}" = "all" ]; then
            echo "🏃 Running ALL E2E tests sequentially (no workers)..."
            # Run all tests with 1 worker to avoid parallel execution
            npx playwright test --workers=1
          else
            echo "🏃 Running tests for module: ${{ matrix.module }}..."
            # Run tests for specific module
            npx playwright test --project=${{ matrix.module }}
          fi
        env:
          PLAYWRIGHT_BASE_URL: ${{ env.STAGING_URL }}
          CI: true
          # Azure service principal credentials for E2E authentication
          E2E_CLIENT_ID: ${{ secrets.E2E_CLIENT_ID }}
          E2E_CLIENT_SECRET: ${{ secrets.E2E_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.REACT_APP_AZURE_TENANT_ID }}

      - name: 📝 Export test results for aggregation
        if: always()
        run: |
          # Parse JSON results and export as artifact metadata
          if [ -f frontend/test-results/results.json ]; then
            TOTAL=$(jq '[ .suites[].suites[]?.specs[]? ] | length' frontend/test-results/results.json 2>/dev/null || echo "0")
            PASSED=$(jq '[ .suites[].suites[]?.specs[]? | select(.ok == true) ] | length' frontend/test-results/results.json 2>/dev/null || echo "0")
            FAILED=$(jq '[ .suites[].suites[]?.specs[]? | select(.ok == false) ] | length' frontend/test-results/results.json 2>/dev/null || echo "0")
            SKIPPED=$(jq '[ .suites[].suites[]?.specs[]? | select(.tests[0].results[0].status == "skipped") ] | length' frontend/test-results/results.json 2>/dev/null || echo "0")

            # Export for downstream jobs
            echo "TOTAL=$TOTAL" >> frontend/test-results/module-summary.env
            echo "PASSED=$PASSED" >> frontend/test-results/module-summary.env
            echo "FAILED=$FAILED" >> frontend/test-results/module-summary.env
            echo "SKIPPED=$SKIPPED" >> frontend/test-results/module-summary.env
            echo "MODULE=${{ matrix.module }}" >> frontend/test-results/module-summary.env

            echo "📊 Module ${{ matrix.module }}: $PASSED/$TOTAL passed"
          fi

      - name: 📊 Publish Test Results to GitHub
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: '🎭 E2E Test Results - ${{ matrix.module }}'
          path: 'frontend/test-results/junit.xml'
          reporter: 'java-junit'
          fail-on-error: false
          fail-on-empty: false

      - name: 📊 Upload E2E test results and HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results-${{ matrix.module }}-${{ github.run_number }}
          path: |
            frontend/test-results/
            frontend/playwright-report/
          retention-days: 30

      - name: 📸 Upload E2E screenshots (failures only)
        uses: actions/upload-artifact@v4
        if: always() && steps.run-tests.outcome == 'failure'
        with:
          name: e2e-failure-screenshots-${{ matrix.module }}-${{ github.run_number }}
          path: frontend/test-results/
          retention-days: 30

  # Aggregate results from all modules
  aggregate-results:
    name: 📊 Aggregate Test Results
    runs-on: ubuntu-latest
    needs: run-e2e-tests
    if: always()

    steps:
      - name: 📥 Download all test artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: e2e-test-results-*-${{ github.run_number }}
          path: all-test-results

      - name: 📝 Create comprehensive aggregate summary
        run: |
          echo "## 🎭 E2E Nightly Regression - Complete Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Staging URL:** ${{ env.STAGING_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "🕐 **Executed at:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Initialize totals
          GRAND_TOTAL=0
          GRAND_PASSED=0
          GRAND_FAILED=0
          GRAND_SKIPPED=0

          # Collect module data
          declare -A MODULE_TOTAL
          declare -A MODULE_PASSED
          declare -A MODULE_FAILED
          declare -A MODULE_SKIPPED

          # Parse results from each module
          for module_dir in all-test-results/e2e-test-results-*; do
            # Look for module-summary.env file
            if [ -f "$module_dir/test-results/module-summary.env" ]; then
              source "$module_dir/test-results/module-summary.env"

              MODULE_TOTAL[$MODULE]=$TOTAL
              MODULE_PASSED[$MODULE]=$PASSED
              MODULE_FAILED[$MODULE]=$FAILED
              MODULE_SKIPPED[$MODULE]=$SKIPPED

              GRAND_TOTAL=$((GRAND_TOTAL + TOTAL))
              GRAND_PASSED=$((GRAND_PASSED + PASSED))
              GRAND_FAILED=$((GRAND_FAILED + FAILED))
              GRAND_SKIPPED=$((GRAND_SKIPPED + SKIPPED))
            fi
          done

          # Overall status
          if [ "$GRAND_FAILED" -eq 0 ]; then
            echo "### ✅ All Tests Passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ $GRAND_FAILED Test(s) Failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          # Summary table
          echo "| Module | Total | Passed | Failed | Skipped |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|--------|--------|---------|" >> $GITHUB_STEP_SUMMARY

          # Total row first
          echo "| **TOTAL** | **$GRAND_TOTAL** | **$GRAND_PASSED** | **$GRAND_FAILED** | **$GRAND_SKIPPED** |" >> $GITHUB_STEP_SUMMARY

          # Module rows in consistent order
          for module in catalog issued-invoices stock-operations transport manufacturing core; do
            if [ -n "${MODULE_TOTAL[$module]}" ]; then
              TOTAL=${MODULE_TOTAL[$module]}
              PASSED=${MODULE_PASSED[$module]}
              FAILED=${MODULE_FAILED[$module]}
              SKIPPED=${MODULE_SKIPPED[$module]}

              STATUS_ICON="✅"
              if [ "$FAILED" -gt 0 ]; then
                STATUS_ICON="❌"
              fi

              echo "| $STATUS_ICON **$module** | $TOTAL | $PASSED | $FAILED | $SKIPPED |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY

          # List all failed tests from all modules
          if [ "$GRAND_FAILED" -gt 0 ]; then
            echo "### ❌ Failed Tests" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            for module_dir in all-test-results/e2e-test-results-*; do
              if [ -f "$module_dir/test-results/results.json" ]; then
                # Extract module name from directory
                MODULE_NAME=$(basename "$module_dir" | sed 's/e2e-test-results-//' | sed 's/-[0-9]*$//')

                # Check if module has failures
                FAILED_COUNT=$(jq '[ .suites[].suites[]?.specs[]? | select(.ok == false) ] | length' "$module_dir/test-results/results.json" 2>/dev/null || echo "0")

                if [ "$FAILED_COUNT" -gt 0 ]; then
                  echo "#### Module: $MODULE_NAME" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY

                  # Extract failed test details
                  jq -r '[ .suites[].suites[]?.specs[]? | select(.ok == false) ] | .[] | "**" + .title + "**\n- File: `" + .file + "`\n- Error: " + (.tests[0].results[0].error.message // "No error message") + "\n"' "$module_dir/test-results/results.json" >> $GITHUB_STEP_SUMMARY

                  echo "" >> $GITHUB_STEP_SUMMARY
                fi
              fi
            done
          fi

          echo "### 📊 View Detailed Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "For detailed HTML reports with screenshots and traces:" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to **Actions** → This workflow run → **Artifacts**" >> $GITHUB_STEP_SUMMARY
          echo "2. Download module-specific artifacts (e.g., \`e2e-test-results-catalog-${{ github.run_number }}\`)" >> $GITHUB_STEP_SUMMARY
          echo "3. Extract and open \`playwright-report/index.html\` in your browser" >> $GITHUB_STEP_SUMMARY

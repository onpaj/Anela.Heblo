name: 🔄 CI - Main Branch (Manual Deployments)

on:
  push:
    branches: [main]

# Cancel previous runs for the same commit
concurrency:
  group: main-branch-ci-${{ github.sha }}
  cancel-in-progress: true

# Features:
# - Parallel frontend and backend tests
# - GitVersion-based semantic versioning
# - Changelog generation (EN + CS translation via OpenAI)
# - Docker image build and push to Docker Hub
# - Git tag creation
# - GitHub release creation with formatted changelog
# - Manual approval gates for staging and production deployments
# - Azure Web App deployment with health checks
# - Comprehensive smoke tests with retries
# - Teams webhook notification on successful production deployment

permissions:
  contents: write
  packages: write
  checks: write

env:
  REGISTRY: docker.io
  IMAGE_NAME: heblo

jobs:
  # Frontend Tests - Parallel execution
  frontend-tests:
    name: 🎯 Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      - name: 🧪 Run tests with coverage
        working-directory: ./frontend
        run: npm test -- --coverage --watchAll=false --reporters=default --reporters=jest-junit
        env:
          REACT_APP_USE_MOCK_AUTH: true
          CI: true
          JEST_JUNIT_OUTPUT_DIR: ./test-results
          JEST_JUNIT_OUTPUT_NAME: junit.xml

      - name: 📊 Upload coverage reports
        uses: codecov/codecov-action@v3
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false
          verbose: true

      - name: 📋 Frontend Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Frontend Tests
          path: frontend/test-results/junit.xml
          reporter: jest-junit
          fail-on-error: false

  # Backend Tests - Parallel execution
  backend-tests:
    name: 🎯 Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: 📦 Restore dependencies
        run: dotnet restore Anela.Heblo.sln

      - name: 🏗️ Build all test projects
        run: |
          dotnet build backend/test/Anela.Heblo.Tests --configuration Release --no-restore
          dotnet build backend/test/Anela.Heblo.Adapters.Shoptet.Tests --configuration Release --no-restore
          dotnet build backend/test/Anela.Heblo.Adapters.Flexi.Tests --configuration Release --no-restore

      - name: 🎭 Install Playwright for Shoptet tests
        run: |
          cd backend/test/Anela.Heblo.Adapters.Shoptet.Tests
          pwsh bin/Release/net8.0/playwright.ps1 install chromium

      - name: 🧪 Run tests with coverage (excluding Playwright integration tests)
        run: dotnet test Anela.Heblo.sln --collect:"XPlat Code Coverage" --logger trx --logger "console;verbosity=normal" --results-directory ./coverage --filter "Category!=Playwright&Category!=Integration" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
        env:
          ASPNETCORE_ENVIRONMENT: Automation
          # Shoptet integration test configuration
          StockClient__Url: ${{ secrets.SHOPTET_STOCK_URL }}
          ProductPriceOptions__ProductExportUrl: ${{ secrets.SHOPTET_PRODUCT_EXPORT_URL }}
          ShoptetPlaywright__ShopEntryUrl: ${{ secrets.SHOPTET_TEST_URL }}
          ShoptetPlaywright__Login: ${{ secrets.SHOPTET_TEST_USERNAME }}
          ShoptetPlaywright__Password: ${{ secrets.SHOPTET_TEST_PASSWORD }}
          ShoptetPlaywright__Headless: true
          # FlexiBee integration test configuration
          FlexiBeeSettings__Server: ${{ secrets.FLEXIBEE_SERVER_URL }}
          FlexiBeeSettings__Login: ${{ secrets.FLEXIBEE_USERNAME }}
          FlexiBeeSettings__Password: ${{ secrets.FLEXIBEE_PASSWORD }}
          FlexiBeeSettings__Company: ${{ secrets.FLEXIBEE_COMPANY }}

      - name: 📊 Process coverage files for CodeCov
        run: |
          # Find all coverage.cobertura.xml files and fix paths for CodeCov
          find ./coverage -name "coverage.cobertura.xml" -type f | while read file; do
            sed -i 's|filename="|filename="backend/src/|g' "$file"
          done

          # Verify coverage files exist
          COVERAGE_COUNT=$(find ./coverage -name "coverage.cobertura.xml" -type f | wc -l)
          if [ "$COVERAGE_COUNT" -eq "0" ]; then
            echo "❌ ERROR: No coverage files found!"
            exit 1
          fi

      - name: 📊 Prepare coverage file list
        id: coverage-files
        run: |
          COVERAGE_FILES=$(find ./coverage -name "coverage.cobertura.xml" -type f | tr '\n' ',' | sed 's/,$//')
          echo "files=$COVERAGE_FILES" >> $GITHUB_OUTPUT

      - name: 📊 Upload coverage reports
        uses: codecov/codecov-action@v3
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ steps.coverage-files.outputs.files }}
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false
          verbose: true

      - name: 📋 Backend Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Backend Tests
          path: coverage/**/*.trx
          reporter: dotnet-trx
          fail-on-error: false

      - name: 🏗️ Build solution
        run: dotnet build Anela.Heblo.sln --configuration Release --no-restore

  # Build and Push Docker Image
  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [frontend-tests, backend-tests]
    outputs:
      version: ${{ steps.version.outputs.version }}
      image-tags: ${{ steps.meta.outputs.tags }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔖 Install GitVersion
        uses: gittools/actions/gitversion/setup@v3.0.0
        with:
          versionSpec: '6.0.x'

      - name: 🔖 Determine version with GitVersion
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3.0.0
        with:
          useConfigFile: true

      - name: 🏷️ Generate version tag
        id: version
        run: |
          # Use GitVersion generated version
          VERSION="v${{ steps.gitversion.outputs.majorMinorPatch }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📌 Version: $VERSION"
          echo "🔢 GitVersion Full SemVer: ${{ steps.gitversion.outputs.fullSemVer }}"

      - name: 📝 Generate Changelog (EN)
        run: |
          chmod +x ./scripts/generate-changelog.sh
          ./scripts/generate-changelog.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITVERSION_SEMVER: ${{ steps.version.outputs.version }}

      - name: 🌐 Translate Changelog to Czech
        run: |
          echo "📋 Translating changelog to Czech..."

          # Check if OPENAI_API_KEY is set
          if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "⚠️ OPENAI_API_KEY secret is not set - skipping Czech translation"
            cp frontend/public/changelog.json frontend/public/changelog.cs.json
            exit 0
          fi

          # Read and prepare the source file
          SOURCE_JSON=$(cat frontend/public/changelog.json)

          # Create the request payload
          REQUEST_PAYLOAD=$(jq -n \
            --arg source_json "$SOURCE_JSON" \
            '{
              "model": "gpt-4o-mini",
              "messages": [
                {"role": "system", "content": "You are a professional translator specializing in technical documentation. Translate from English to Czech while preserving technical terms and JSON structure. Return only valid JSON without markdown formatting or code blocks."},
                {"role": "user", "content": "Přelož všechny hodnoty v JSONu z angličtiny do češtiny. Zachovej strukturu JSON a technické termíny (fix, feature, commit, docs etc). Návratová hodnota musí být pouze validní JSON bez jakéhokoliv markdown formátování nebo code blocků."},
                {"role": "user", "content": $source_json}
              ]
            }')

          # Make the API call
          RESPONSE=$(curl -s -w "\n%{http_code}" https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
            -d "$REQUEST_PAYLOAD")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          RESPONSE_BODY=$(echo "$RESPONSE" | head -n -1)

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "❌ OpenAI API call failed - using English version as fallback"
            cp frontend/public/changelog.json frontend/public/changelog.cs.json
            exit 0
          fi

          # Extract the translated content
          TRANSLATED_CONTENT=$(echo "$RESPONSE_BODY" | jq -r '.choices[0].message.content')

          # Extract JSON from markdown code blocks if present
          if echo "$TRANSLATED_CONTENT" | grep -q '```json'; then
            TRANSLATED_JSON=$(echo "$TRANSLATED_CONTENT" | sed -n '/```json/,/```/p' | sed '1d;$d')
          else
            TRANSLATED_JSON="$TRANSLATED_CONTENT"
          fi

          # Save the translated content
          echo "$TRANSLATED_JSON" > frontend/public/changelog.cs.json

          # Validate the translated JSON
          if ! jq empty frontend/public/changelog.cs.json; then
            echo "❌ Translated changelog is invalid - using English version as fallback"
            cp frontend/public/changelog.json frontend/public/changelog.cs.json
            exit 0
          fi

          echo "✅ Czech translation generated successfully!"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: 📋 Validate Generated Changelogs
        run: |
          echo "📋 Validating generated changelog files..."

          # Validate English changelog
          if [ ! -f frontend/public/changelog.json ]; then
            echo "❌ English changelog not found!"
            exit 1
          fi

          if ! jq empty frontend/public/changelog.json; then
            echo "❌ English changelog is not valid JSON!"
            exit 1
          fi

          # Validate Czech changelog
          if [ ! -f frontend/public/changelog.cs.json ]; then
            echo "❌ Czech changelog not found!"
            exit 1
          fi

          if ! jq empty frontend/public/changelog.cs.json; then
            echo "❌ Czech changelog is not valid JSON!"
            exit 1
          fi

          echo "✅ All changelog files validated successfully!"

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 📝 Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: 🏗️ Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            REACT_APP_API_URL=https://heblo.anela.cz
            REACT_APP_USE_MOCK_AUTH=false
            REACT_APP_AZURE_CLIENT_ID=${{ secrets.REACT_APP_AZURE_CLIENT_ID }}
            REACT_APP_AZURE_AUTHORITY=${{ secrets.REACT_APP_AZURE_AUTHORITY }}
            REACT_APP_AZURE_BACKEND_CLIENT_ID=${{ secrets.REACT_APP_AZURE_BACKEND_CLIENT_ID }}
            REACT_APP_AZURE_TENANT_ID=${{ secrets.REACT_APP_AZURE_TENANT_ID }}

      - name: 📝 Build Summary
        run: |
          echo "## 🐳 Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tags**: ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Built at**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⏸️ Deployment Paused" >> $GITHUB_STEP_SUMMARY
          echo "Docker image built and pushed to registry." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next Steps:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to the **Actions** tab" >> $GITHUB_STEP_SUMMARY
          echo "2. Click on this workflow run" >> $GITHUB_STEP_SUMMARY
          echo "3. **Approve staging deployment** in the 'deploy-staging' job" >> $GITHUB_STEP_SUMMARY
          echo "4. **Approve production deployment** in the 'deploy-production' job" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "You can approve both at once, or approve them at different times." >> $GITHUB_STEP_SUMMARY

      - name: 🏷️ Create and Push Git Tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "🏷️ Creating Git tag: $VERSION"

          # Configure Git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create tag
          git tag -a "$VERSION" -m "Release $VERSION"

          # Push tag to repository
          git push origin "$VERSION"

          echo "✅ Git tag $VERSION created and pushed successfully!"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Create GitHub Release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "📦 Creating GitHub release: $VERSION"

          # Read the English changelog
          if [ ! -f frontend/public/changelog.json ]; then
            echo "❌ Changelog file not found!"
            exit 1
          fi

          # Extract changelog for current version
          CURRENT_VERSION="${VERSION#v}"
          RELEASE_NOTES=$(jq -r --arg version "$CURRENT_VERSION" '
            .versions[] |
            select(.version == $version) |
            "## Changes\n\n" +
            (
              .changes | group_by(.type) | map(
                (
                  if .[0].type == "feature" then "### ✨ Features"
                  elif .[0].type == "fix" then "### 🐛 Bug Fixes"
                  elif .[0].type == "improvement" then "### 📈 Improvements"
                  elif .[0].type == "docs" then "### 📚 Documentation"
                  elif .[0].type == "perf" then "### ⚡ Performance"
                  elif .[0].type == "refactor" then "### ♻️ Refactoring"
                  elif .[0].type == "test" then "### 🧪 Tests"
                  elif .[0].type == "ci" then "### 👷 CI/CD"
                  else "### 📝 Other"
                  end
                ) + "\n" + (map("- " + .title) | join("\n"))
              ) | join("\n\n")
            )
          ' frontend/public/changelog.json || echo "No changelog available for this version.")

          # Check if jq extraction was successful
          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="## Changes\n\nSee [changelog](https://heblo.anela.cz) for detailed release notes."
          fi

          # Create GitHub release
          echo "$RELEASE_NOTES" | gh release create "$VERSION" \
            --title "Release $VERSION" \
            --notes-file - \
            --verify-tag

          echo "✅ GitHub release $VERSION created successfully!"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Deploy to Staging - MANUAL APPROVAL REQUIRED
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: staging-approval
    outputs:
      webapp-hostname: ${{ steps.deploy.outputs.hostname }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_TEST }}

      - name: 🚀 Deploy to Azure Web App (Staging)
        id: deploy
        run: |
          WEBAPP_NAME="heblo-test"
          VERSION="${{ needs.build-and-push.outputs.version }}"
          DOCKER_IMAGE="${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:$VERSION"

          echo "🎯 Deploying to staging: $WEBAPP_NAME"
          echo "🐳 Docker image: $DOCKER_IMAGE"

          # Configure container deployment
          az webapp config set \
            --name $WEBAPP_NAME \
            --resource-group rgHeblo \
            --linux-fx-version "DOCKER|$DOCKER_IMAGE" \
            --output none

          az webapp config container set \
            --name $WEBAPP_NAME \
            --resource-group rgHeblo \
            --container-image-name "$DOCKER_IMAGE" \
            --container-registry-url https://index.docker.io/v1/ \
            --output none

          # Restart and wait
          az webapp restart --name $WEBAPP_NAME --resource-group rgHeblo --output none
          sleep 15

          # Get hostname
          WEBAPP_HOSTNAME=$(az webapp show \
            --name $WEBAPP_NAME \
            --resource-group rgHeblo \
            --query "defaultHostName" \
            --output tsv)

          echo "hostname=$WEBAPP_HOSTNAME" >> $GITHUB_OUTPUT
          echo "WEBAPP_NAME=$WEBAPP_NAME" >> $GITHUB_ENV

      - name: 🔧 Configure App Settings
        run: |
          az webapp config appsettings set \
            --resource-group rgHeblo \
            --name $WEBAPP_NAME \
            --settings \
              ASPNETCORE_ENVIRONMENT=Staging \
              WEBSITES_PORT=8080 \
              WEBSITES_ENABLE_APP_SERVICE_STORAGE=false \
              DOCKER_REGISTRY_SERVER_URL=https://index.docker.io \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false \
              APP_VERSION="${{ needs.build-and-push.outputs.version }}" \
              DEPLOYMENT_SOURCE="CI-Main"

      - name: ⏳ Wait for deployment to be ready
        run: |
          echo "⏳ Waiting for deployment to be ready..."

          # Initial wait for container startup (increased from 30s to 60s)
          sleep 60

          # Liveness check with retries - uses /health/live to avoid waiting for background service hydration
          # (increased from 10 to 20 attempts with 15s intervals = 5 minutes total)
          MAX_ATTEMPTS=20
          ATTEMPT=1

          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "🔍 Liveness check attempt $ATTEMPT/$MAX_ATTEMPTS..."

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://${{ steps.deploy.outputs.hostname }}/health/live || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Deployment is live! (attempt $ATTEMPT/$MAX_ATTEMPTS)"
              break
            fi

            if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
              echo "❌ Deployment failed to become live after $MAX_ATTEMPTS attempts"
              echo "Last HTTP status code: $HTTP_CODE"
              exit 1
            fi

            echo "⏳ Waiting for deployment... (HTTP $HTTP_CODE, attempt $ATTEMPT/$MAX_ATTEMPTS)"
            sleep 15
            ATTEMPT=$((ATTEMPT + 1))
          done

      - name: 📝 Deployment Summary
        run: |
          echo "## 🚀 Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ needs.build-and-push.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://${{ steps.deploy.outputs.hostname }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: Staging" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed at**: $(date)" >> $GITHUB_STEP_SUMMARY

  # Deploy to Production - MANUAL APPROVAL REQUIRED
  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: production
    outputs:
      webapp-hostname: ${{ steps.deploy.outputs.hostname }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_PROD }}

      - name: 🚀 Deploy to Azure Web App (Production)
        id: deploy
        run: |
          WEBAPP_NAME="heblo"
          VERSION="${{ needs.build-and-push.outputs.version }}"
          DOCKER_IMAGE="${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:$VERSION"

          echo "🎯 Deploying to production: $WEBAPP_NAME"
          echo "🐳 Docker image: $DOCKER_IMAGE"

          # Configure container deployment
          az webapp config set \
            --name $WEBAPP_NAME \
            --resource-group rgHeblo \
            --linux-fx-version "DOCKER|$DOCKER_IMAGE" \
            --output none

          az webapp config container set \
            --name $WEBAPP_NAME \
            --resource-group rgHeblo \
            --container-image-name "$DOCKER_IMAGE" \
            --container-registry-url https://index.docker.io/v1/ \
            --output none

          # Restart and wait
          az webapp restart --name $WEBAPP_NAME --resource-group rgHeblo --output none
          sleep 15

          # Get hostname
          WEBAPP_HOSTNAME=$(az webapp show \
            --name $WEBAPP_NAME \
            --resource-group rgHeblo \
            --query "defaultHostName" \
            --output tsv)

          echo "hostname=$WEBAPP_HOSTNAME" >> $GITHUB_OUTPUT
          echo "WEBAPP_NAME=$WEBAPP_NAME" >> $GITHUB_ENV

      - name: 🔧 Configure App Settings
        run: |
          az webapp config appsettings set \
            --resource-group rgHeblo \
            --name $WEBAPP_NAME \
            --settings \
              ASPNETCORE_ENVIRONMENT=Production \
              WEBSITES_PORT=8080 \
              WEBSITES_ENABLE_APP_SERVICE_STORAGE=false \
              DOCKER_REGISTRY_SERVER_URL=https://index.docker.io \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false \
              APP_VERSION="${{ needs.build-and-push.outputs.version }}" \
              DEPLOYMENT_SOURCE="CI-Main"

      - name: ⏳ Wait for deployment to be ready
        run: |
          echo "⏳ Waiting for deployment to be ready..."

          # Initial wait for container startup (increased from 30s to 60s)
          sleep 60

          # Liveness check with retries - uses /health/live to avoid waiting for background service hydration
          # (increased from 10 to 20 attempts with 15s intervals = 5 minutes total)
          MAX_ATTEMPTS=20
          ATTEMPT=1

          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "🔍 Liveness check attempt $ATTEMPT/$MAX_ATTEMPTS..."

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://${{ steps.deploy.outputs.hostname }}/health/live || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Deployment is live! (attempt $ATTEMPT/$MAX_ATTEMPTS)"
              break
            fi

            if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
              echo "❌ Deployment failed to become live after $MAX_ATTEMPTS attempts"
              echo "Last HTTP status code: $HTTP_CODE"
              exit 1
            fi

            echo "⏳ Waiting for deployment... (HTTP $HTTP_CODE, attempt $ATTEMPT/$MAX_ATTEMPTS)"
            sleep 15
            ATTEMPT=$((ATTEMPT + 1))
          done

      - name: 🧪 Run Smoke Tests
        run: |
          echo "🧪 Running smoke tests against production..."

          HOSTNAME="${{ steps.deploy.outputs.hostname }}"
          TIMEOUT=30
          ALL_PASSED=true

          # Health check with timeout
          echo "🔍 Testing /health endpoint..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time "$TIMEOUT" "https://$HOSTNAME/health" || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Health check passed (HTTP $HTTP_CODE)"
          else
            echo "❌ Health check failed (HTTP $HTTP_CODE)"
            ALL_PASSED=false
          fi

          # Liveness check with timeout
          echo "🔍 Testing /health/live endpoint..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time "$TIMEOUT" "https://$HOSTNAME/health/live" || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Liveness check passed (HTTP $HTTP_CODE)"
          else
            echo "❌ Liveness check failed (HTTP $HTTP_CODE)"
            ALL_PASSED=false
          fi

          if [ "$ALL_PASSED" = true ]; then
            echo "✅ All smoke tests passed!"
          else
            echo "❌ Some smoke tests failed!"
            exit 1
          fi

      - name: 📝 Deployment Summary
        run: |
          echo "## 🚀 Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ needs.build-and-push.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://${{ steps.deploy.outputs.hostname }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: Production" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed at**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Smoke Tests Passed" >> $GITHUB_STEP_SUMMARY
          echo "All health checks passed successfully!" >> $GITHUB_STEP_SUMMARY

      - name: 📢 Notify Teams about Production Deployment
        if: success()
        run: |
          VERSION="${{ needs.build-and-push.outputs.version }}"
          HOSTNAME="${{ steps.deploy.outputs.hostname }}"

          echo "📢 Sending Teams notification for version $VERSION..."

          # Create Teams message payload
          TEAMS_MESSAGE=$(cat <<EOF
          {
            "@type": "MessageCard",
            "@context": "https://schema.org/extensions",
            "summary": "Heblo ${VERSION} úspěšně nasazeno",
            "themeColor": "00AA00",
            "title": "🚀 Heblo ${VERSION} úspěšně nasazeno",
            "sections": [
              {
                "activityTitle": "Produkční nasazení dokončeno",
                "activitySubtitle": "$(date '+%Y-%m-%d %H:%M:%S UTC')",
                "facts": [
                  {
                    "name": "Verze:",
                    "value": "${VERSION}"
                  },
                  {
                    "name": "Prostředí:",
                    "value": "Production"
                  },
                  {
                    "name": "URL:",
                    "value": "https://${HOSTNAME}"
                  },
                  {
                    "name": "Workflow:",
                    "value": "${GITHUB_WORKFLOW}"
                  }
                ],
                "markdown": true
              }
            ],
            "potentialAction": [
              {
                "@type": "OpenUri",
                "name": "Zobrazit aplikaci",
                "targets": [
                  {
                    "os": "default",
                    "uri": "https://${HOSTNAME}"
                  }
                ]
              },
              {
                "@type": "OpenUri",
                "name": "Zobrazit workflow run",
                "targets": [
                  {
                    "os": "default",
                    "uri": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
                  }
                ]
              }
            ]
          }
          EOF
          )

          # Send to Teams webhook
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "$TEAMS_MESSAGE" \
            "${{ secrets.TEAMS_WEBHOOK_URL }}")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Teams notification sent successfully!"
          else
            echo "⚠️ Failed to send Teams notification (HTTP $HTTP_CODE)"
            echo "Note: This is not a critical failure, continuing workflow..."
          fi
        env:
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}

<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#4f46e5" />
    <meta
      name="description"
      content="Anela Heblo - Workspace aplikace pro kosmetickou společnost"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <script>
      // Apply the saved theme before the bundle loads to avoid a flash of light mode.
      (function () {
        try {
          var t = localStorage.getItem('anela-theme');
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          if (t === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <script>
      var p = location.pathname;
      if (p === '/terminal' || p.startsWith('/terminal/')) {
        document.querySelector('link[rel="manifest"]').setAttribute('href', '/manifest.terminal.json');
      } else if (p === '/baleni' || p.startsWith('/baleni/')) {
        document.querySelector('link[rel="manifest"]').setAttribute('href', '/manifest.baleni.json');
      }
    </script>
    <title>Anela Heblo</title>
  </head>
  <body>
    <noscript>Pro správné fungování této aplikace je potřeba JavaScript.</noscript>
    <div id="root"></div>
  </body>
</html>
